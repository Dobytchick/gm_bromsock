name: CI / Release

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
 build-linux-ssl:
    name: Linux (SSL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build inside Ubuntu 18.04 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            ubuntu:18.04 \
            bash -c "
              set -e
              dpkg --add-architecture i386
              apt-get update -qq
              apt-get install -y gcc-multilib g++-multilib make libssl1.0-dev:i386
              cd /src/Source/gm_bromsock
              make -f Makefile_ssl
            "

      - uses: actions/upload-artifact@v4
        with:
          name: linux-ssl
          path: Source/gm_bromsock/gmsv_bromsock_linux.so

  build-linux-nossl:
    name: Linux (no SSL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y gcc-multilib g++-multilib make

      - name: Build
        working-directory: Source/gm_bromsock
        run: make -f Makefile_nossl

      - uses: actions/upload-artifact@v4
        with:
          name: linux-nossl
          path: Source/gm_bromsock/gmsv_bromsock_linux_nossl.so

  build-windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Install OpenSSL x86-static-md via vcpkg
        shell: pwsh
        run: |
          # Community triplet: static libs built with /MD (dynamic CRT)
          $tripletDir  = "$env:VCPKG_INSTALLATION_ROOT\triplets\community"
          $tripletFile = "$tripletDir\x86-windows-static-md.cmake"
          if (-not (Test-Path $tripletFile)) {
            New-Item -ItemType Directory -Force $tripletDir | Out-Null
            Set-Content $tripletFile @'
set(VCPKG_TARGET_ARCHITECTURE x86)
set(VCPKG_CRT_LINKAGE dynamic)
set(VCPKG_LIBRARY_LINKAGE static)
'@
          }
          vcpkg install openssl:x86-windows-static-md

      - name: Patch vcxproj via XML API
        shell: pwsh
        run: |
          $vcpkg = "$env:VCPKG_INSTALLATION_ROOT\installed\x86-windows-static-md"
          $proj  = "Source\gm_bromsock\gm_bromsock.vcxproj"

          [xml]$xml = Get-Content $proj -Encoding UTF8

          $xml.Project.PropertyGroup |
            Where-Object { $_.IncludePath -match 'OpenSSL' } |
            ForEach-Object {
              $_.IncludePath = "$vcpkg\include;" + ($_.IncludePath -replace '[^;]*OpenSSL[^;]*;?', '')
            }

          foreach ($idg in $xml.Project.ItemDefinitionGroup) {
            $link = $idg.Link
            if ($link) {
              # Fix AdditionalLibraryDirectories
              if ($link.AdditionalLibraryDirectories -match 'OpenSSL') {
                $link.AdditionalLibraryDirectories = "$vcpkg\lib"
              }
              if ($link.AdditionalDependencies -match 'leay32') {
                $link.AdditionalDependencies = "libssl.lib;libcrypto.lib;Crypt32.lib;ws2_32.lib;%(AdditionalDependencies)"
              }
            }
            # Remove PostBuildEvent lines that COPY to the developer's local Steam path
            if ($idg.PostBuildEvent -and $idg.PostBuildEvent.Command -match 'Steam') {
              $idg.PostBuildEvent.Command = (
                $idg.PostBuildEvent.Command -split "`r?`n" |
                Where-Object { $_ -notmatch 'Steam' }
              ) -join "`r`n"
            }
          }

          $xml.Save((Resolve-Path $proj).Path)

      - name: Build SSL (Release)
        shell: pwsh
        run: >
          msbuild Source\gm_bromsock.sln
          /p:Configuration=Release
          /p:Platform=Win32
          /p:PlatformToolset=v143
          /nologo /verbosity:minimal

      - name: Build no-SSL (release_noSSL)
        shell: pwsh
        run: >
          msbuild Source\gm_bromsock.sln
          /p:Configuration=release_noSSL
          /p:Platform=Win32
          /p:PlatformToolset=v143
          /nologo /verbosity:minimal

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "Source\gm_bromsock\Release\gm_bromsock.dll"             "dist\gmsv_bromsock_win32.dll"
          Copy-Item "Source\gm_bromsock\release_noSSL\gm_bromsock_nossl.dll" "dist\gmsv_bromsock_win32_nossl.dll"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/
  release:
    name: Release
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [build-linux-ssl, build-linux-nossl, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next semantic version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          tag_prefix: v

      - name: Download artifacts
        if: steps.semver.outputs.new_tag != ''
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename artifacts for release
        if: steps.semver.outputs.new_tag != ''
        run: |
          mv dist/linux-ssl/gmsv_bromsock_linux.so        dist/gmsv_bromsock_linux.dll
          mv dist/linux-nossl/gmsv_bromsock_linux_nossl.so dist/gmsv_bromsock_linux_nossl.dll
          mv dist/windows/gmsv_bromsock_win32.dll          dist/gmsv_bromsock_win32.dll
          mv dist/windows/gmsv_bromsock_win32_nossl.dll    dist/gmsv_bromsock_win32_nossl.dll

      - name: Publish GitHub Release
        if: steps.semver.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.new_tag }}
          name: "Release ${{ steps.semver.outputs.new_tag }}"
          body: ${{ steps.semver.outputs.changelog }}
          files: |
            dist/gmsv_bromsock_linux.dll
            dist/gmsv_bromsock_linux_nossl.dll
            dist/gmsv_bromsock_win32.dll
            dist/gmsv_bromsock_win32_nossl.dll
